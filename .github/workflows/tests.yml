name: UI tests 

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest 

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 
        uses: actions/setup-python@v5
        with: 
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
          # Добавлена установка системных зависимостей для браузеров
          playwright install --with-deps 

      - name: Run Playwright tests with pytest and generate Allure results
        run: |
          pytest -m regression --alluredir=./allure-results --numprocesses 2
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages 

      - name: Allure Report action
        # Используем актуальный рабочий экшен
        uses: mgrybyk-org/allure-report-branch-action@v1.4.6
        if: always()
        with: 
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          # В v3 токены передаются через 'with', а не 'env'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages 
          publish_dir: allure-history
